<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andy Training</title>
    <style>
        body { margin: 0; background-color: red; color: yellow; font-family: Arial; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        #action { font-size: 15vw; font-weight: bold; }
        #timer { font-size: 30vw; }
        button { padding: 20px; font-size: 20px; background: white; color: red; border-radius: 10px; border: none; cursor: pointer; margin: 10px; }
        #error-log { color: white; font-size: 12px; position: absolute; bottom: 10px; }
    </style>
</head>
<body>
    <div id="action">ANDY TRAINING</div>
    <div id="timer">KIES START</div>
    <div id="menu">
        <button onclick="start(false)">MET SONG</button>
        <button onclick="start(true)">SNELSTART (20s)</button>
    </div>
    <div id="error-log"></div>

    <script>
        const audioPath = "audio/";
        const sounds = {
            intro: new Audio(audioPath + "naamloos.wav"),
            start: new Audio(audioPath + "START.mp3"),
            stop: new Audio(audioPath + "stop 0.555 sec.mp3"),
            finish: new Audio(audioPath + "aftellen 1 naar 1.mp3")
        };

        function logError(msg) { document.getElementById('error-log').innerText += msg + " | "; }

        // Test of bestanden laden
        Object.keys(sounds).forEach(key => {
            sounds[key].onerror = () => logError("Kan " + sounds[key].src + " niet vinden");
        });

        function start(skip) {
            document.getElementById('menu').style.display = 'none';
            // Unlock audio
            Object.values(sounds).forEach(s => { s.play(); s.pause(); s.currentTime = 0; });
            
            let dur = 20;
            if(!skip) { sounds.intro.play(); dur = 180; }
            
            setTimeout(() => {
                document.body.style.backgroundColor = "green";
                document.getElementById('action').innerText = "START";
                sounds.start.play();
                // Hier start de rest van de cyclus...
            }, dur * 1000);
        }
    </script>
</body>
</html>
